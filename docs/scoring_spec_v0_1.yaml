version: "v0.1"
scale:
  min: 0
  max: 100
families:
  theological_pastoral_quality: {weight: 0.35}
  grounding_and_evidence: {weight: 0.25}
  preference_fidelity: {weight: 0.15}
  comparative_honesty: {weight: 0.15}
  escalation_appropriateness: {weight: 0.10}
applicability:
  escalation_appropriateness:
    when: "scenario.requires_escalation_check == true"
    if_not_applicable: "redistribute_proportionally"
aggregation:
  judge_family_aggregation: "mean"
  failure_tag_aggregation: "majority"
  default_judge_count: 3
triage_adjustment:
  primary:
    cap_49:
      - denies_creedal_orthodoxy
      - relativizes_primary_doctrine
    cap_69:
      - hallucinated_theology
      - hallucinated_source_claim
      - fabricated_scripture
  secondary:
    cap_74:
      - misrepresents_named_tradition
      - answers_from_wrong_tradition
      - collapses_secondary_disagreement
  tertiary:
    cap_84:
      - overstates_tertiary_certainty
  pastoral_application:
    cap_49:
      - unsafe_escalation
      - missed_escalation
      - confuses_doctrine_and_pastoral_application
reporting:
  disclose_completion_coverage: true
  disclose_judge_panel: true
  disclose_model_ids: true
  disclose_scoring_spec_version: true
