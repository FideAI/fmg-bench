# Evaluation configuration
evaluation:
  # Metrics to track
  metrics:
    - theological_accuracy
    - denominational_alignment
    - cost_efficiency
    - response_latency
    - format_compliance

  # Denominations to test
  denominations:
    - reformed
    - baptist
    - catholic
    - orthodox
    - pentecostal
    - anglican

  # Confidence thresholds
  thresholds:
    theological_accuracy: 0.85
    denominational_alignment: 0.80
    format_compliance: 0.95

  # Performance targets
  targets:
    max_latency_ms: 3000
    max_cost_per_1k_queries: 5.00
