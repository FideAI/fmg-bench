benchmark:
  name: FMG-Bench
  version: 1.0.0
  title: Faith & Moral Guidance Benchmark v1
scenario_set: fmg_bench_v1
scenarios_dir: ../dataset/data
output_dir: results/system_benchmark/fmg_bench_v1
judge_models:
  - openai/gpt-5.4-mini
  - google/gemini-3.1-flash-lite-preview
  - anthropic/claude-sonnet-4.6
# Operational note: FMG-Bench prompts are long and OpenRouter provider/model
# paths can consume substantial completion budget in message.reasoning before
# returning final message.content. Future production runs should use generous
# target-model caps, e.g. --model-max-tokens 20000, especially for recovery
# passes after finish_reason=length/content-null failures.
models:
  - model_name: openai/gpt-5.4
    tier: openrouter_provider_frontier
    provider_lab: OpenAI
    openrouter_name: "OpenAI: GPT-5.4"
    enabled: true
  - model_name: anthropic/claude-opus-4.7
    tier: openrouter_provider_frontier
    provider_lab: Anthropic
    openrouter_name: "Anthropic: Claude Opus 4.7"
    enabled: true
  - model_name: google/gemini-3.1-pro-preview
    tier: openrouter_provider_frontier
    provider_lab: Google
    openrouter_name: "Google: Gemini 3.1 Pro Preview"
    enabled: true
  - model_name: x-ai/grok-4.20
    tier: openrouter_provider_frontier
    provider_lab: xAI
    openrouter_name: "xAI: Grok 4.20"
    enabled: true
  - model_name: deepseek/deepseek-v4-pro
    tier: openrouter_provider_frontier
    provider_lab: DeepSeek
    openrouter_name: "DeepSeek: DeepSeek V4 Pro"
    enabled: true
  - model_name: moonshotai/kimi-k2.6
    tier: openrouter_provider_frontier
    provider_lab: Moonshot AI
    openrouter_name: "MoonshotAI: Kimi K2.6"
    enabled: true
  - model_name: minimax/minimax-m2.7
    tier: openrouter_provider_frontier
    provider_lab: MiniMax
    openrouter_name: "MiniMax: MiniMax M2.7"
    enabled: true
  - model_name: qwen/qwen3.6-plus
    tier: openrouter_provider_frontier
    provider_lab: Alibaba Qwen
    openrouter_name: "Qwen: Qwen3.6 Plus"
    enabled: true
  - model_name: z-ai/glm-5.1
    tier: openrouter_provider_frontier
    provider_lab: Z.ai
    openrouter_name: "Z.ai: GLM 5.1"
    enabled: true
  - model_name: mistralai/mistral-large-2512
    tier: openrouter_provider_frontier
    provider_lab: Mistral AI
    openrouter_name: "Mistral: Mistral Large 3 2512"
    enabled: true
  - model_name: meta-llama/llama-4-maverick
    tier: openrouter_provider_frontier
    provider_lab: Meta
    openrouter_name: "Meta: Llama 4 Maverick"
    enabled: true
  - model_name: nvidia/nemotron-3-super-120b-a12b
    tier: openrouter_provider_frontier
    provider_lab: NVIDIA
    openrouter_name: "NVIDIA: Nemotron 3 Super"
    enabled: true
  - model_name: xiaomi/mimo-v2.5-pro
    tier: openrouter_provider_frontier
    provider_lab: Xiaomi
    openrouter_name: "Xiaomi: MiMo-V2.5-Pro"
